version: '3.8'

services:
  web:
    build: .
    # This command applies any pending migrations, compiles translations, and starts the development server
    command: >
      sh -c "python manage.py migrate &&
             mkdir -p locale &&
             python manage.py compilemessages &&
             python manage.py collectstatic --noinput &&
             uvicorn core.asgi:application --host 0.0.0.0 --port 8000 --reload"
    expose:
      - "8000"
    restart: always
    volumes:
      # Mounts the current directory to /app in the container for live-reloading during development
      # This also persists your local db.sqlite3 file
      - .:/app
    environment:
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=core.settings

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    restart: always
    volumes:
      - .:/app
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
